<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peaky Pan — Tienda Minorista 24 Horas</title>
  
  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
      if(e.keyCode == 123) return false;
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dark: { DEFAULT: '#000000', card: '#111111', light: '#222222' }, yolk: { DEFAULT: '#FFD700', hover: '#FFC107', soft: 'rgba(255, 215, 0, 0.1)' } },
          fontFamily: { display: ['Oswald', 'sans-serif'], body: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg: #000000; --fg: #FFFFFF; --accent: #FFD700; --card: #111111; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; }
    .font-display { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
    
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1050; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .sidebar-overlay.active { opacity: 1; pointer-events: all; }
    .sidebar-panel { position: fixed; top: 0; left: 0; bottom: 0; width: 300px; background: #050505; z-index: 1060; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); border-right: 2px solid var(--accent); display: flex; flex-direction: column; }
    .sidebar-panel.active { transform: translateX(0); }
    
    .product-card { background: var(--card); border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: all 0.2s; }
    .product-card:active { transform: scale(0.97); border-color: var(--accent); }
    .featured-card { min-width: 280px; height: 350px; position: relative; border-radius: 16px; overflow: hidden; border: 2px solid var(--accent); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); flex-shrink: 0; }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 1px solid #222; z-index: 900; padding-bottom: env(safe-area-inset-bottom); display: flex; }
    .bottom-nav button { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #666; padding: 12px 0; background: none; border: none; cursor: pointer; flex: 1; transition: color 0.2s; -webkit-tap-highlight-color: transparent; }
    .bottom-nav button.active { color: var(--accent); }
    .bottom-nav button:active { color: var(--accent); }
    
    .modal-overlay { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.9); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal-box { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); width: 100%; max-height: 95vh; overflow-y: auto; background: #0a0a0a; border-top: 2px solid var(--accent); }
    .modal-overlay.visible .modal-box { transform: translateY(0); }
    
    .admin-input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid #333; font-size: 15px; font-family: 'Inter', sans-serif; background: #1a1a1a; color: #fff; }
    .admin-input:focus { outline: none; border-color: var(--accent); }
    .badge-cart { position: absolute; top: 5px; right: calc(50% - 15px); background: var(--accent); color: #000; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .tabs-scroll { overflow-x: auto; scrollbar-width: none; }
    .tabs-scroll::-webkit-scrollbar { display: none; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120%); background: var(--accent); color: #000; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; z-index: 2000; transition: transform 0.4s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .logo-container { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 200px; }
    .logo-text-fallback { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; text-align: center; padding: 0 20px; }
    .logo-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; padding: 0 16px; }

    .conn-warning { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; padding: 10px 16px; border-radius: 8px; font-size: 13px; text-align: center; margin: 12px 16px; display: none; }
    .conn-warning.show { display: block; }
  </style>
</head>
<body>

  <div id="connWarning" class="conn-warning">
    <i class="fas fa-exclamation-triangle mr-1"></i>
    No se pudo conectar a la base de datos. Revisa tu conexión a internet.
  </div>

  <!-- SIDEBAR LATERAL -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="sidebarPanel" class="sidebar-panel">
    <div class="p-6 border-b border-gray-800 text-center">
      <h2 class="font-display text-2xl text-yolk">Menú</h2>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebarMenu"></div>
    <div class="p-4 border-t border-gray-800 space-y-2" id="sidebarAdmin"></div>
  </div>

  <!-- HEADER CON LOGO -->
  <header class="relative bg-black flex items-center justify-center py-10 border-b border-gray-900">
    <div class="logo-container">
      <div class="logo-text-fallback">
        <h1 class="text-5xl font-bold text-yolk drop-shadow-[0_0_30px_rgba(255,215,0,0.4)]">PEAKY PAN</h1>
        <p class="text-gray-400 text-sm mt-2 tracking-widest">Tienda Minorista 24 Horas</p>
      </div>
      <img
        id="logoImg"
        src="https://raw.githubusercontent.com/MJB1207/Peaky-Pan-24hrs/b48779d1989d162371d33745fedc090328111a22/1782923872639.png"
        alt="Peaky Pan Logo"
        class="logo-img"
        crossorigin="anonymous"
      >
    </div>
  </header>

  <!-- DESTACADOS -->
  <section id="destacados" class="py-8 px-4 bg-black">
    <div class="flex justify-between items-center mb-6 px-2">
      <h2 class="font-display text-3xl text-yolk flex items-center gap-3"><i class="fas fa-star"></i> DESTACADOS</h2>
    </div>
    <div id="featuredScroll" class="flex gap-4 overflow-x-auto pb-4 tabs-scroll snap-x snap-mandatory"></div>
  </section>

  <!-- CATÁLOGO -->
  <main id="catalogSection" class="pb-28 px-4 bg-black min-h-screen">
    <div class="max-w-lg mx-auto pt-6">
      <h2 class="font-display text-2xl text-white mb-6 border-b border-gray-800 pb-2" id="catalogTitle">TODOS LOS PRODUCTOS</h2>
      <div id="productGrid" class="grid grid-cols-2 gap-3"></div>
    </div>
  </main>

  <!-- MODAL BILLAR -->
  <div id="billarModal" class="modal-overlay">
    <div class="modal-box p-6">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-display text-2xl text-yolk">RESERVAR BILLAR</h3>
        <button onclick="closeAllModals()" class="text-gray-400 text-2xl"><i class="fas fa-times"></i></button>
      </div>
      <div class="space-y-4">
        <p class="text-sm text-gray-400 flex items-center gap-2"><i class="fas fa-clock text-yolk"></i> Horario: 8:00 AM - 10:00 PM</p>
        <p class="text-xl font-bold text-white">Precio: 600 CUP <span class="text-sm text-yolk" id="billarUsd"></span> / Hora</p>
        <div><label class="block text-xs text-gray-500 mb-1">Nombre</label><input type="text" id="billarName" placeholder="Tu nombre" class="admin-input"></div>
        <div><label class="block text-xs text-gray-500 mb-1">Teléfono</label><input type="tel" id="billarPhone" placeholder="Tu teléfono" class="admin-input"></div>
        <div><label class="block text-xs text-gray-500 mb-1">Día</label><input type="date" id="billarDate" class="admin-input"></div>
        <div><label class="block text-xs text-gray-500 mb-1">Hora</label><select id="billarTime" class="admin-input"><option value="">Selecciona hora</option></select></div>
        <button onclick="sendBillarBooking()" class="w-full py-3 rounded-lg font-bold text-black text-base bg-yolk active:scale-95 transition flex items-center justify-center gap-2 mt-2"><i class="fab fa-whatsapp text-xl"></i> RESERVAR POR WHATSAPP</button>
      </div>
    </div>
  </div>

  <!-- MODAL CARRITO -->
  <div id="cartModal" class="modal-overlay">
    <div class="modal-box p-6">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-display text-2xl text-yolk">MI PEDIDO</h3>
        <button onclick="closeAllModals()" class="text-gray-400 text-2xl"><i class="fas fa-times"></i></button>
      </div>
      <div id="cartItems" class="space-y-4 mb-6 max-h-60 overflow-y-auto"></div>
      <div id="checkoutForm" class="space-y-3 border-t border-gray-800 pt-4 hidden">
        <h4 class="font-bold text-yolk">Datos de Envío</h4>
        <input type="text" id="checkName" placeholder="Tu nombre completo" class="admin-input">
        <input type="tel" id="checkPhone" placeholder="Número de teléfono" class="admin-input">
        <input type="text" id="checkAddress" placeholder="Dirección de entrega" class="admin-input">
        <select id="checkMunicipality" class="admin-input"><option value="">Selecciona el municipio</option></select>
        <select id="checkPayment" class="admin-input"><option value="Efectivo">Efectivo</option><option value="Transferencia">Transferencia</option></select>
        <textarea id="checkNotes" rows="2" placeholder="Notas adicionales (opcional)" class="admin-input" style="resize:none;"></textarea>
        <div id="cartTotalSummary" class="text-right pt-2 text-white"></div>
        <button type="button" id="sendWhatsapp" class="w-full py-3 rounded-lg font-bold text-black text-base bg-yolk active:scale-95 transition flex items-center justify-center gap-2 mt-2"><i class="fab fa-whatsapp text-xl"></i> ENVIAR PEDIDO</button>
      </div>
    </div>
  </div>

  <!-- MODAL LOGIN -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-box p-8">
      <h3 class="font-display text-2xl text-yolk mb-4 text-center">ADMIN ACCESS</h3>
      <div class="space-y-4">
        <input id="loginUser" type="email" class="admin-input" placeholder="Email Admin">
        <input id="loginPass" type="password" class="admin-input" placeholder="Contraseña">
        <p id="loginError" class="text-red-500 text-sm hidden">Credenciales incorrectas.</p>
        <button type="button" id="loginBtn" class="w-full py-3 rounded-lg font-bold text-black bg-yolk active:scale-95 transition">ENTRAR</button>
        <button type="button" onclick="closeAllModals()" class="w-full py-3 rounded-lg font-bold text-gray-400 border border-gray-700 transition">CANCELAR</button>
      </div>
    </div>
  </div>

  <!-- MODAL ADMIN -->
  <div id="adminModal" class="modal-overlay">
    <div class="modal-box bg-black text-white flex flex-col" style="height:100vh; max-height:100vh; border-radius:0; border-top:none;">
      <header class="p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
        <h2 class="font-display text-lg text-yolk">PANEL ADMIN</h2>
        <button onclick="closeAllModals()" class="text-gray-400 hover:text-white text-2xl"><i class="fas fa-times"></i></button>
      </header>
      <div class="flex gap-1 p-3 border-b border-gray-800 shrink-0 bg-[#050505] overflow-x-auto tabs-scroll">
        <button type="button" onclick="showAdminPage('dashboard')" class="admin-tab px-3 py-2 rounded text-xs font-bold text-gray-500 shrink-0" data-page="dashboard">Inicio</button>
        <button type="button" onclick="showAdminPage('sections')" class="admin-tab px-3 py-2 rounded text-xs font-bold text-gray-500 shrink-0" data-page="sections">Secciones</button>
        <button type="button" onclick="showAdminPage('products')" class="admin-tab px-3 py-2 rounded text-xs font-bold text-gray-500 shrink-0" data-page="products">Productos</button>
        <button type="button" onclick="showAdminPage('settings')" class="admin-tab px-3 py-2 rounded text-xs font-bold text-gray-500 shrink-0" data-page="settings">Config</button>
      </div>
      <div id="adminContent" class="flex-1 overflow-y-auto p-5 bg-black"></div>
      <footer class="p-3 border-t border-gray-800 shrink-0 bg-black">
        <button type="button" id="adminLogout" class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg hover:bg-red-900/30 text-red-400 font-bold transition"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
      </footer>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- BARRA INFERIOR -->
  <nav class="bottom-nav">
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="active"><i class="fas fa-home text-xl"></i><span>Inicio</span></button>
    <button onclick="toggleSidebar()" id="navMenu"><i class="fas fa-bars text-xl"></i><span>Menú</span></button>
    <button onclick="openCart()" id="navCart" class="relative"><i class="fas fa-shopping-bag text-xl"></i><span id="cartBadge" class="badge-cart hidden">0</span><span>Pedido</span></button>
  </nav>

  <script>
    /* =============================================
       CONFIGURACIÓN SUPABASE — CLAVE REAL INCLUIDA
       ============================================= */
    var SUPABASE_URL = 'https://qtbhkurhxgdfxlnzswbw.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0YmhrdXJoeGdkZnhsbnpzd2J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTMzMDUsImV4cCI6MjA5ODQ2OTMwNX0.RGVxA4g3BrUBFEgYAiCJuzLQHIoRF6ALov9r7wZtPrA';
    var supabaseClient = null;

    try {
      if (window.supabase && window.supabase.createClient) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase conectado correctamente.');
      }
    } catch(e) {
      console.error('Error creando cliente Supabase:', e);
    }

    /* =============================================
       ESTADO GLOBAL
       ============================================= */
    var storeData = { sections: [], shippingZones: [], exchangeRate: 300, whatsappNumber: '' };
    var isLoggedIn = false;
    var currentAdminPage = 'dashboard';
    var activeSectionTab = -1;
    var adminSelectedSection = 0;
    var cart = [];
    var editingSectionId = null;
    var editingProductId = null;
    var editingProductSectionId = null;

    /* =============================================
       UTILIDADES
       ============================================= */
    function sanitizeData() {
      if (!storeData.sections) storeData.sections = [];
      if (!storeData.shippingZones) storeData.shippingZones = [];
      storeData.exchangeRate = Number(storeData.exchangeRate) || 300;
      for (var i = 0; i < storeData.sections.length; i++) {
        var s = storeData.sections[i];
        if (!s.products) s.products = [];
        s.id = Number(s.id);
        for (var j = 0; j < s.products.length; j++) {
          var p = s.products[j];
          p.id = Number(p.id);
          p.priceCUP = Number(p.priceCUP) || 0;
          p.quantity = Number(p.quantity) || 10;
          p.is_featured = (p.is_featured === true);
        }
      }
    }

    function getUSD(priceCUP) {
      return Number(priceCUP) / (Number(storeData.exchangeRate) || 300);
    }

    function formatPrice(priceCUP) {
      var cup = Math.round(Number(priceCUP));
      var usd = getUSD(priceCUP).toFixed(2);
      return '<span class="text-white font-bold">' + cup.toLocaleString() + ' CUP</span> <span class="text-xs text-yolk font-normal">($' + usd + ' USD)</span>';
    }

    function getAllProducts() {
      var all = [];
      for (var i = 0; i < storeData.sections.length; i++) {
        var prods = storeData.sections[i].products || [];
        for (var j = 0; j < prods.length; j++) { all.push(prods[j]); }
      }
      return all;
    }

    function findProductById(pId) {
      var all = getAllProducts();
      for (var i = 0; i < all.length; i++) {
        if (all[i].id === Number(pId)) return all[i];
      }
      return null;
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.style.background = (type === 'error') ? '#ef4444' : 'var(--accent)';
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    function openModal(id) {
      var el = document.getElementById(id);
      if (el) { el.classList.add('visible'); document.body.style.overflow = 'hidden'; }
    }

    function closeAllModals() {
      var modals = document.querySelectorAll('.modal-overlay');
      for (var i = 0; i < modals.length; i++) { modals[i].classList.remove('visible'); }
      document.body.style.overflow = '';
    }

    function toggleSidebar() {
      document.getElementById('sidebarOverlay').classList.toggle('active');
      document.getElementById('sidebarPanel').classList.toggle('active');
    }

    function filterBySection(index) {
      activeSectionTab = index;
      var title = (index === -1) ? 'TODOS LOS PRODUCTOS' : storeData.sections[index].name.toUpperCase();
      document.getElementById('catalogTitle').innerText = title;
      renderCatalog();
    }

    /* =============================================
       LOGO
       ============================================= */
    (function() {
      var img = document.getElementById('logoImg');
      if (img) {
        img.onload = function() { console.log('Logo cargado correctamente.'); };
        img.onerror = function() {
          console.warn('No se pudo cargar el logo. Se muestra texto de respaldo.');
          this.style.display = 'none';
        };
      }
    })();

    /* =============================================
       CARGA DE DATOS
       ============================================= */
    async function fetchStoreData() {
      if (!supabaseClient) {
        console.warn('Supabase no disponible.');
        document.getElementById('connWarning').classList.add('show');
        sanitizeData(); renderSidebar(); renderFeatured(); renderCatalog(); renderAdminSidebar();
        return;
      }

      try {
        var settingsResp = await supabaseClient.from('peaky_settings').select('*').eq('id', 1).single();
        if (settingsResp.data) {
          var settings = settingsResp.data;
          storeData.whatsappNumber = settings.whatsappNumber || '';
          storeData.exchangeRate = Number(settings.exchangeRate) || 300;
          if (settings.shippingZones) {
            storeData.shippingZones = (typeof settings.shippingZones === 'string') ? JSON.parse(settings.shippingZones) : settings.shippingZones;
          }
        }

        var secsResp = await supabaseClient.from('peaky_sections').select('*').order('id', { ascending: true });
        var prodsResp = await supabaseClient.from('peaky_products').select('*');
        var secs = secsResp.data || [];
        var prods = prodsResp.data || [];

        storeData.sections = [];
        for (var i = 0; i < secs.length; i++) {
          var sec = secs[i];
          sec.products = [];
          for (var j = 0; j < prods.length; j++) {
            if (prods[j].section_id === sec.id) sec.products.push(prods[j]);
          }
          storeData.sections.push(sec);
        }

        document.getElementById('connWarning').classList.remove('show');

      } catch(e) {
        console.error("Error cargando datos:", e);
        document.getElementById('connWarning').classList.add('show');
      }

      sanitizeData(); renderSidebar(); renderFeatured(); renderCatalog(); renderAdminSidebar();

      if (document.getElementById('adminModal').classList.contains('visible')) {
        showAdminPage(currentAdminPage);
      }
    }

    async function uploadImage(file) {
      if (!file || !supabaseClient) return null;
      var fileExt = file.name.split('.').pop();
      var fileName = Date.now() + '_' + Math.random().toString(36).substring(7) + '.' + fileExt;
      var filePath = 'productos/' + fileName;
      var result = await supabaseClient.storage.from('peaky_imagenes').upload(filePath, file, { cacheControl: '3600', upsert: false });
      if (result.error) { showToast('Error subiendo imagen', 'error'); return null; }
      var urlData = supabaseClient.storage.from('peaky_imagenes').getPublicUrl(filePath);
      return urlData.data.publicUrl;
    }

    /* =============================================
       AUTENTICACIÓN
       ============================================= */
    function checkAuth() {
      if (!supabaseClient) return;
      supabaseClient.auth.onAuthStateChange(function(event, session) {
        isLoggedIn = !!session;
        renderAdminSidebar();
      });
    }

    async function handleLogin() {
      if (!supabaseClient) return showToast('Error de conexión', 'error');
      try {
        await supabaseClient.auth.signInWithPassword({
          email: document.getElementById('loginUser').value,
          password: document.getElementById('loginPass').value
        });
        closeAllModals(); openModal('adminModal'); showAdminPage('dashboard'); renderAdminSidebar();
        showToast('Bienvenida al Panel', 'success');
      } catch(e) {
        document.getElementById('loginError').classList.remove('hidden');
      }
    }

    async function handleLogout() {
      if (supabaseClient) await supabaseClient.auth.signOut();
      closeAllModals(); showToast('Sesión cerrada');
    }

    function renderAdminSidebar() {
      var el = document.getElementById('sidebarAdmin');
      if (isLoggedIn) {
        el.innerHTML = '<button onclick="toggleSidebar();openModal(\'adminModal\');showAdminPage(\'dashboard\');" class="w-full text-left p-3 rounded-lg bg-yolk/10 border border-yolk/30 hover:bg-yolk hover:text-black transition font-bold flex items-center gap-3 text-yolk"><i class="fas fa-cog w-5"></i> Panel Admin</button>';
      } else {
        el.innerHTML = '<button onclick="toggleSidebar();openModal(\'loginModal\');" class="w-full text-left p-3 rounded-lg border border-gray-700 hover:border-yolk/50 transition font-medium flex items-center gap-3 text-gray-600 hover:text-yolk"><i class="fas fa-lock w-5"></i> Admin</button>';
      }
    }

    /* =============================================
       SIDEBAR
       ============================================= */
    function renderSidebar() {
      var menu = document.getElementById('sidebarMenu');
      var html = '<button onclick="filterBySection(-1);toggleSidebar();" class="w-full text-left p-3 rounded-lg bg-yolk/10 border border-yolk/30 hover:bg-yolk hover:text-black transition font-bold flex items-center gap-3 text-yolk mb-2"><i class="fas fa-fire w-5"></i> Todos</button>';
      for (var i = 0; i < storeData.sections.length; i++) {
        var s = storeData.sections[i];

    function openBillarModal() {

      document.getElementById('billarDate').setAttribute('min', today);
      var sel = document.getElementById('billarTime');
      sel.innerHTML = '<option value="">Selecciona hora</option>';
      for (var i = 8; i <= 22; i++) {
        var ampm = (i >= 12) ? 'PM' : 'AM';
        var hour12 = (i > 12) ? (i - 12) : i;
        sel.innerHTML += '<option value="' + hour12 + ':00 ' + ampm + '">' + hour12 + ':00 ' + ampm + '</option>';
      }
      openModal('billarModal');
    }

    function sendBillarBooking() {
      var name = document.getElementById('billarName').value.trim();
      var phone = document.getElementById('billarPhone').value.trim();
      var dateRaw = document.getElementById('billarDate').value;
      var time = document.getElementById('billarTime').value;
      if (!name || !phone || !dateRaw || !time) { showToast('Completa todos los datos', 'error'); return; }
      var formattedDate = new Date(dateRaw + 'T12:00:00').toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
      var rate = Number(storeData.exchangeRate) || 300;
      var msg = '*Reserva de Billar - Peaky Pan*\n\n*Cliente:* ' + name + '\n*Teléfono:* ' + phone + '\n*Día:* ' + formattedDate + '\n*Hora:* ' + time + '\n\n*Precio:* 600 CUP ($' + (600 / rate).toFixed(2) + ' USD) la hora\n\n*Por favor confirmar su reserva.*';
      var phoneClean = (storeData.whatsappNumber || '').replace(/[^0-9]/g, '');
      if (!phoneClean) { showToast('Configura el número de WhatsApp en el panel admin', 'error'); return; }
      window.open('https://wa.me/' + phoneClean + '?text=' + encodeURIComponent(msg), '_blank');
      closeAllModals();
    }

    /* =============================================
       CARRITO
       ============================================= */
    function addToCart(pId) {
      var p = findProductById(pId);
      if (!p) return;
      var current = 0;
      for (var i = 0; i < cart.length; i++) { if (cart[i].id === p.id) { current = cart[i].quantity; break; } }
      if (current >= (Number(p.quantity) || 0)) { showToast('Sin stock', 'error'); return; }
      var found = false;
      for (var i = 0; i < cart.length; i++) { if (cart[i].id === p.id) { cart[i].quantity++; found = true; break; } }
      if (!found) cart.push({ id: p.id, name: p.name, priceCUP: Number(p.priceCUP) || 0, image: p.image_url, quantity: 1 });
      updateCartBadge(); showToast('Añadido al pedido', 'success');
    }

    function openCart() { openModal('cartModal'); renderCartModal(); }

    function updateCartBadge() {
      var t = 0;
      for (var i = 0; i < cart.length; i++) t += cart[i].quantity;
      var b = document.getElementById('cartBadge');
      if (t > 0) { b.textContent = t; b.classList.remove('hidden'); }
      else { b.classList.add('hidden'); }
    }

    function updateQuantity(pId, delta) {
      for (var i = 0; i < cart.length; i++) {
        if (cart[i].id === pId) { cart[i].quantity += delta; if (cart[i].quantity <= 0) cart.splice(i, 1); break; }
      }
      renderCartModal(); updateCartBadge();
    }
